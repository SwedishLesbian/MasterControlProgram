name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: MasterControlProgram
            asset_name: MasterControlProgram-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: MasterControlProgram
            asset_name: MasterControlProgram-linux-x86_64-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: MasterControlProgram.exe
            asset_name: MasterControlProgram-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}
        env:
          MCP_NVIDIA_NIM_KEY: ${{ secrets.MCP_NVIDIA_NIM_KEY }}

      - name: Rename binary for upload
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/MasterControlProgram-linux-x86_64/MasterControlProgram-linux-x86_64
            artifacts/MasterControlProgram-linux-x86_64-musl/MasterControlProgram-linux-x86_64-musl
            artifacts/MasterControlProgram-windows-x86_64.exe/MasterControlProgram-windows-x86_64.exe
